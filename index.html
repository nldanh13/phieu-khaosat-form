<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phiếu Thu Thập Số Liệu — ĐH Y Dược Cần Thơ</title>
  <style>
    :root {
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --blue-mid: #378ADD;
      --teal: #0F6E56;
      --teal-light: #E1F5EE;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --amber: #854F0B;
      --amber-light: #FAEEDA;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --gray: #5F5E5A;
      --gray-light: #F1EFE8;
      --gray-mid: #D3D1C7;
      --text: #2C2C2A;
      --text-muted: #5F5E5A;
      --surface: #ffffff;
      --bg: #f8f7f4;
      --border: rgba(44, 44, 42, 0.12);
      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #e8e6e0;
        --text-muted: #9c9a92;
        --surface: #1e1e1c;
        --bg: #161614;
        --border: rgba(255, 255, 255, 0.1);
        --gray-light: #2a2a28;
        --blue-light: #0c2a40;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: var(--blue);
    }

    /* Layout */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-brand {
      font-weight: 600;
      font-size: 13px;
      color: var(--blue);
    }

    .topbar-sub {
      font-size: 11px;
      color: var(--text-muted);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Screens */
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }

    .btn:hover {
      background: var(--gray-light);
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .btn-primary:hover {
      background: #0C447C;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Form elements */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--blue-mid);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 64px;
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    /* Step bar */
    .step-bar {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .step-item {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      cursor: default;
      transition: all .15s;
    }

    .step-item.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      font-weight: 600;
    }

    .step-item.done {
      color: var(--green);
    }

    /* HADS table */
    .hads-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .hads-table th {
      padding: 7px 8px;
      text-align: left;
      background: var(--bg);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .hads-table td {
      padding: 8px 6px;
      border-top: 1px solid var(--border);
      vertical-align: top;
    }

    .hads-table tr:hover td {
      background: var(--bg);
    }

    .hads-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .badge-A {
      background: var(--blue-light);
      color: var(--blue);
    }

    .badge-D {
      background: var(--amber-light);
      color: var(--amber);
    }

    .opt-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .opt-list label {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.4;
    }

    .opt-list input {
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* VAS */
    .vas-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vas-wrap input[type=range] {
      flex: 1;
    }

    .vas-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
      min-width: 32px;
      text-align: center;
    }

    .vas-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Score box */
    .score-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--bg);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-top: 10px;
    }

    .score-cell {
      text-align: center;
    }

    .score-val {
      font-size: 20px;
      font-weight: 700;
    }

    .score-lbl {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* PSQI table */
    .psqi-tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .psqi-tbl th {
      padding: 6px 8px;
      text-align: center;
      background: var(--bg);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .psqi-tbl td {
      padding: 7px 6px;
      border-top: 1px solid var(--border);
    }

    .psqi-tbl td:not(:first-child) {
      text-align: center;
    }

    /* Dashboard */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: var(--blue-light);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--blue);
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    @media (max-width: 400px) {
      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .phieu-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .15s;
    }

    .phieu-item:hover {
      border-color: var(--blue-mid);
    }

    .phieu-name {
      font-size: 13px;
      font-weight: 600;
    }

    .phieu-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .badge-blue {
      background: var(--blue-light);
      color: var(--blue);
    }

    .badge-green {
      background: var(--green-light);
      color: var(--green);
    }

    .badge-amber {
      background: var(--amber-light);
      color: var(--amber);
    }

    .badge-gray {
      background: var(--gray-light);
      color: var(--gray);
    }

    .form-footer {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    /* Alerts */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .alert-info {
      background: var(--blue-light);
      color: var(--blue);
    }

    .alert-success {
      background: var(--green-light);
      color: var(--green);
    }

    .alert-error {
      background: var(--red-light);
      color: var(--red);
    }

    .alert.hidden {
      display: none;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .3);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.show {
      display: flex;
    }

    .loading-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loading">
    <div class="loading-box">
      <div class="spinner"></div> Đang lưu dữ liệu...
    </div>
  </div>

  <div class="topbar">
    <div>
      <div class="topbar-brand">Phiếu Thu Thập Số Liệu Nghiên Cứu</div>
      <div class="topbar-sub">Khoa Ngoại CTCH-TK — ĐH Y Dược Cần Thơ</div>
    </div>
    <div class="btn-group">
      <button class="btn btn-sm" id="btn-dash" onclick="showScreen('dash')" style="display:none">← Dashboard</button>
      <button class="btn btn-sm btn-primary" onclick="showScreen('new')" id="btn-new-top" style="display:none">+ Phiếu
        mới</button>
    </div>
  </div>

  <!-- ─── LOGIN ─────────────────────────────────────────────────────── -->
  <div id="screen-login" class="screen active">
    <div class="container" style="max-width:400px;padding-top:60px;">
      <div class="card">
        <div class="card-title">Đăng nhập</div>
        <div id="login-alert" class="alert alert-error hidden"></div>
        <div class="form-group" style="margin-bottom:10px;">
          <label>Tên đăng nhập</label>
          <input type="text" id="inp-user" placeholder="admin / dtv1 / dtv2...">
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label>Mật khẩu</label>
          <input type="password" id="inp-pass" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Đăng nhập</button>
        <p style="font-size:11px;color:var(--text-muted);margin-top:10px;text-align:center;">Demo: admin/admin123 ·
          dtv1/dtv123</p>
      </div>
    </div>
  </div>

  <!-- ─── DASHBOARD ──────────────────────────────────────────────────── -->
  <div id="screen-dash" class="screen">
    <div class="container">
      <div id="dash-alert" class="alert hidden"></div>
      <div class="stat-grid" id="stat-grid">
        <div class="stat-card">
          <div class="stat-num" id="s-total">—</div>
          <div class="stat-lbl">Tổng phiếu</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="s-b1">—</div>
          <div class="stat-lbl">Bước 1</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="s-b2">—</div>
          <div class="stat-lbl">Bước 2</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="s-done">—</div>
          <div class="stat-lbl">Hoàn thành</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:600;">Danh sách phiếu</div>
        <div class="btn-group">
          <button class="btn btn-sm" onclick="loadDanhSach()">Tải lại</button>
          <button class="btn btn-sm btn-primary" onclick="showScreen('new')">+ Phiếu mới</button>
        </div>
      </div>
      <div id="phieu-list"></div>
    </div>
  </div>

  <!-- ─── FORM ───────────────────────────────────────────────────────── -->
  <div id="screen-new" class="screen">
    <div class="container">
      <div id="form-alert" class="alert hidden"></div>
      <div class="step-bar">
        <div class="step-item active" id="tab1">Bước 1 — Nhập viện</div>
        <div class="step-item" id="tab2">Bước 2 — Trước mổ</div>
        <div class="step-item" id="tab3">Bước 3 — Sau mổ</div>
      </div>
      <div id="step1"></div>
      <div id="step2" style="display:none"></div>
      <div id="step3" style="display:none"></div>
      <div class="form-footer">
        <div style="font-size:11px;color:var(--text-muted)" id="footer-info">Bước 1/3</div>
        <div class="btn-group">
          <button class="btn btn-sm" id="btn-prev" onclick="prevStep()" style="display:none">← Trước</button>
          <button class="btn btn-sm btn-primary" id="btn-next" onclick="nextStep()">Lưu & Tiếp theo →</button>
          <button class="btn btn-sm btn-primary" id="btn-finish" onclick="finishForm()" style="display:none">Lưu & Hoàn
            thành</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────────
    // Thay bằng URL thực sau khi deploy backend lên Render.com
    const API_URL = "https://script.google.com/macros/s/AKfycbzLuQkgOe541D1HpS8CImWcDwG26kJ2_EqqeXwxGDA5X3z8Cdxdy77sw8rCwI3x3vXI/exec";

    // Demo users (trong thực tế nên dùng backend auth)
    const USERS = {
      "admin": { pass: "admin123", role: "admin", name: "Admin" },
      "dtv1": { pass: "dtv123", role: "dtv", name: "Điều tra viên 1" },
      "dtv2": { pass: "dtv123", role: "dtv", name: "Điều tra viên 2" },
    };

    let currentUser = null;
    let currentStep = 1;
    let currentMaPhieu = null;
    let danhSachCache = [];

    // ── Auth ─────────────────────────────────────────────────────────────────────
    function doLogin() {
      const u = document.getElementById("inp-user").value.trim();
      const p = document.getElementById("inp-pass").value;
      const el = document.getElementById("login-alert");
      if (!USERS[u] || USERS[u].pass !== p) {
        el.textContent = "Sai tên đăng nhập hoặc mật khẩu.";
        el.classList.remove("hidden");
        return;
      }
      currentUser = { username: u, ...USERS[u] };
      el.classList.add("hidden");
      showScreen("dash");
      loadDanhSach();
    }

    function showScreen(name) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById("screen-" + name).classList.add("active");
      document.getElementById("btn-dash").style.display = (name !== "dash") ? "inline-block" : "none";
      document.getElementById("btn-new-top").style.display = (name === "dash") ? "inline-block" : "none";
      if (name === "new") {
        currentMaPhieu = genMaPhieu();
        currentStep = 1;
        buildStep1(); buildStep2(); buildStep3();
        showStep(1);
      }
    }

    // ── Helpers ──────────────────────────────────────────────────────────────────
    function genMaPhieu() {
      return "PK" + Date.now().toString(36).toUpperCase().slice(-6);
    }
    function showLoading(v) {
      document.getElementById("loading").classList.toggle("show", v);
    }
    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = "alert alert-" + type;
    }
    function hideAlert(id) {
      document.getElementById(id).className = "alert hidden";
    }

    // ── Dashboard ─────────────────────────────────────────────────────────────────
    async function loadDanhSach() {
      showAlert("dash-alert", "Đang tải dữ liệu từ Google Sheets...", "info");
      try {
        const res = await fetch(API_URL + "/api/danh-sach");
        if (!res.ok) throw new Error("Lỗi " + res.status);
        danhSachCache = await res.json();
        renderDashboard(danhSachCache);
        hideAlert("dash-alert");
      } catch (e) {
        showAlert("dash-alert", "Không kết nối được API. Kiểm tra URL hoặc thử lại. (" + e.message + ")", "error");
      }
    }

    function renderDashboard(list) {
      document.getElementById("s-total").textContent = list.length;
      document.getElementById("s-b1").textContent = list.filter(p => !p.buoc || p.buoc <= 1).length;
      document.getElementById("s-b2").textContent = list.filter(p => p.buoc === 2).length;
      document.getElementById("s-done").textContent = list.filter(p => p.buoc >= 3).length;
      const el = document.getElementById("phieu-list");
      if (!list.length) { el.innerHTML = '<div class="empty">Chưa có phiếu nào.</div>'; return; }
      el.innerHTML = list.slice().reverse().map(p =>
        `<div class="phieu-item">
      <div class="phieu-name">${p.ho_ten || "(Chưa có tên)"}</div>
      <div class="phieu-meta">
        <span class="badge badge-gray">${p.ma_phieu}</span>
        <span class="badge badge-blue">${p.ngay_thu_thap || ""}</span>
        ${p.gioi_tinh ? `<span class="badge badge-gray">${p.gioi_tinh}</span>` : ""}
        ${p.loai_pt ? `<span class="badge badge-amber">${p.loai_pt}</span>` : ""}
      </div>
    </div>`
      ).join("");
    }

    // ── Form Steps ────────────────────────────────────────────────────────────────
    function showStep(n) {
      currentStep = n;
      ["step1", "step2", "step3"].forEach((id, i) => {
        document.getElementById(id).style.display = (i + 1 === n) ? "block" : "none";
      });
      ["tab1", "tab2", "tab3"].forEach((id, i) => {
        document.getElementById(id).className = "step-item" + (i + 1 === n ? " active" : i + 1 < n ? " done" : "");
      });
      document.getElementById("btn-prev").style.display = n > 1 ? "inline-block" : "none";
      document.getElementById("btn-next").style.display = n < 3 ? "inline-block" : "none";
      document.getElementById("btn-finish").style.display = n === 3 ? "inline-block" : "none";
      document.getElementById("footer-info").textContent = `Bước ${n}/3 — Mã phiếu: ${currentMaPhieu}`;
    }

    async function nextStep() {
      if (await saveCurrentStep()) showStep(currentStep + 1);
    }
    function prevStep() { showStep(currentStep - 1); }
    async function finishForm() {
      if (await saveCurrentStep()) {
        showAlert("form-alert", `Phiếu ${currentMaPhieu} đã lưu hoàn thành!`, "success");
        setTimeout(() => { showScreen("dash"); loadDanhSach(); }, 1500);
      }
    }

    async function saveCurrentStep() {
      showLoading(true);
      try {
        const data = collectStep(currentStep);
        data.ma_phieu = currentMaPhieu;
        data.buoc = currentStep;
        data.dieu_tra_vien = currentUser?.name || "";
        const res = await fetch(API_URL + "/api/phieu", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const result = await res.json();
        if (!res.ok || !result.success) throw new Error(result.error || "Lỗi lưu");
        showLoading(false);
        return true;
      } catch (e) {
        showLoading(false);
        showAlert("form-alert", "Lỗi lưu dữ liệu: " + e.message, "error");
        return false;
      }
    }

    function collectStep(n) {
      const get = id => { const el = document.getElementById(id); return el ? el.value : ""; };
      const getInt = id => { const el = document.getElementById(id); return el ? parseInt(el.value) || 0 : 0; };
      const getFloat = id => { const el = document.getElementById(id); return el ? parseFloat(el.value) || 0 : 0; };

    function calcBMI() {

      if (cn > 0 && cc > 0) {
        const bmi = (cn / (cc * cc)).toFixed(1);
        let cat = bmi < 18.5 ? "Thiếu cân" : bmi < 23 ? "Bình thường" : bmi < 27.5 ? "Thừa cân" : "Béo phì";
        el.textContent = `BMI: ${bmi} kg/m² — ${cat} (theo WHO châu Á)`;
      } else { el.textContent = ""; }
    }

    // ── Score calculations ────────────────────────────────────────────────────────
    function calcHADS() {
      let A = 0, D = 0, tA = 0, tD = 0;
      HADS_DATA.forEach(h => {
        const sel = document.querySelector(`input[name="hads_${h.id}"]:checked`);
        if (sel) { if (h.t === "A") { A += +sel.value; tA++; } else { D += +sel.value; tD++; } }
      });
      const aEl = document.getElementById("h-a"), dEl = document.getElementById("h-d");
      const aiEl = document.getElementById("h-ai"), diEl = document.getElementById("h-di");
      if (aEl) aEl.textContent = tA === 7 ? A : "—";
      if (dEl) dEl.textContent = tD === 7 ? D : "—";
      const interp = s => s >= 11 ? "Rối loạn" : s >= 8 ? "Nguy cơ" : "Bình thường";
      const clr = s => s >= 11 ? "var(--red)" : s >= 8 ? "var(--amber)" : "var(--green)";
      if (aiEl && tA === 7) { aiEl.textContent = interp(A); aiEl.style.color = clr(A); }
      if (diEl && tD === 7) { diEl.textContent = interp(D); diEl.style.color = clr(D); }
    }

    function calcPSQI() {
      const gi = id => parseInt(document.getElementById(id)?.value || 0) || 0;
      const gf = id => parseFloat(document.getElementById(id)?.value || 0) || 0;
      const C1 = gi("f_psqi6");
      const p2 = gf("f_psqi2"), p5a = gi("f_psqi5a");
      const c2r = p2 <= 15 ? 0 : p2 <= 30 ? 1 : p2 <= 60 ? 2 : 3;
      const C2 = Math.round((c2r + p5a) / 2);
      const p4 = gf("f_psqi4");
      const C3 = p4 > 7 ? 0 : p4 >= 6 ? 1 : p4 >= 5 ? 2 : 3;
      let C4 = 0;
      const t1 = (document.getElementById("f_psqi1")?.value || "").split(":");
      const t3 = (document.getElementById("f_psqi3")?.value || "").split(":");
      if (t1.length === 2 && t3.length === 2 && p4 > 0) {
        const bed = +t1[0] * 60 + +t1[1], wake = +t3[0] * 60 + +t3[1];
        const inBed = wake > bed ? wake - bed : wake + 1440 - bed;
        const eff = inBed > 0 ? p4 * 60 / inBed * 100 : 0;
        C4 = eff >= 85 ? 0 : eff >= 75 ? 1 : eff >= 65 ? 2 : 3;
      }
      let dist = 0; for (let i = 0; i < 9; i++) { const s = document.querySelector(`input[name="psqi_5_${i}"]:checked`); if (s) dist += +s.value; }
      const C5 = dist === 0 ? 0 : dist <= 9 ? 1 : dist <= 18 ? 2 : 3;
      const C6 = gi("f_psqi7");
      const C7 = Math.round((gi("f_psqi8") + gi("f_psqi9")) / 2);
      const total = C1 + C2 + C3 + C4 + C5 + C6 + C7;
      const tv = document.getElementById("psqi-total"), ti = document.getElementById("psqi-interp");
      if (tv) tv.textContent = total;
      if (ti) { ti.textContent = total >= 5 ? "Kém (≥5)" : "Tốt (<5)"; ti.style.color = total >= 5 ? "var(--red)" : "var(--green)"; }
    }
  </script>
